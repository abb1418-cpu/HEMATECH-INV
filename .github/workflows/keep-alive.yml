name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://awrqvnokxzfbrjeywxns.supabase.co/rest/v1/invoices?select=id&limit=1" \
            -H "apikey: sb_publishable_UHaKzgBXB48gfg_7twANXQ_qa_qaxVD" \
            -H "Authorization: Bearer sb_publishable_UHaKzgBXB48gfg_7twANXQ_qa_qaxVD")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "200" ]; then exit 1; fi
          echo "Supabase is alive!"
